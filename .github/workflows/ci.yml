name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting. The toolchain (stable 1.86 plus rustfmt) comes from
  # rust-toolchain.toml, which rustup honors automatically on checkout.
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --all --check

  # Lints and tests over the host, with every feature on so the verification
  # fixtures (round-float/f64, interval-1788/fixture) are exercised.
  clippy-test:
    name: clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked

  # The no_std cross-compile. Every crate builds for the embedded thumb targets
  # (listed in rust-toolchain.toml so rustup installs them), bare and with each
  # verification feature, to prove nothing pulled in std or alloc by accident.
  no-std-cross:
    name: no_std cross
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [thumbv6m-none-eabi, thumbv8m.main-none-eabi]
    steps:
      - uses: actions/checkout@v4
      - run: cargo build -p round-float   --no-default-features                  --locked --target ${{ matrix.target }}
      - run: cargo build -p round-float   --no-default-features --features f64    --locked --target ${{ matrix.target }}
      - run: cargo build -p round-float   --no-default-features --features f64-tight --locked --target ${{ matrix.target }}
      - run: cargo build -p interval-1788 --no-default-features                  --locked --target ${{ matrix.target }}
      - run: cargo build -p interval-1788 --no-default-features --features fixture --locked --target ${{ matrix.target }}
      - run: cargo build -p affine-arith  --no-default-features                  --locked --target ${{ matrix.target }}

  # Model checking. The discrete set-based case logic and the decoration lattice
  # are discharged by Kani over the f64 fixture. cargo-kani brings its own
  # toolchain, so the workspace 1.86 pin does not constrain it.
  #
  # The timeout is the CBMC-blowup stop loss (ADR-0006, bead enc-otn): every
  # harness discharges in seconds to minutes, and the observed failure mode is
  # a formula that never returns, not one that fails. Twenty minutes covers the
  # three tool installs plus every discharge with wide margin; a run that hits
  # it is a blowup to diagnose, never a gate to wait out.
  kani:
    name: kani
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          args: "-p interval-1788 --features fixture"
      # affine-arith's discrete skeleton (symbol freshness, from_raw_parts, merge shape, condensation counts).
      - uses: model-checking/kani-github-action@v1
        with:
          args: "-p affine-arith --features fixture"
      # round-float's Kulisch accumulator carry, borrow, and shift-index logic.
      - uses: model-checking/kani-github-action@v1
        with:
          args: "-p round-float --features f64-tight"

  # The reference registry. Structural validation only (frontmatter completeness,
  # INDEX sync, vendored hashes); no network calls, so it cannot flake on a dead
  # link. Archived-URL liveness is a human check at write time.
  references:
    name: reference registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check_references.py

  # The transcendental oracle lane. `elementary-oracle` is workspace-excluded and
  # depends on pfloat (a correctly-rounded libm that needs nightly for
  # `feature(generic_const_exprs)`), so it runs on its own pinned nightly in a
  # dedicated job. It certifies the f64 fixture's and affine-arith's exp/ln bounds
  # enclose pfloat-libm's correctly-rounded values, discharging the soundness
  # round-float ADR-0001 left resting on musl's accuracy goal. The shipped crates
  # never depend on pfloat; this lane is verification only. The crate's
  # rust-toolchain.toml pins the nightly that rustup installs on first use.
  oracle:
    name: transcendental oracle (nightly)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/elementary-oracle
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked
